{% extends 'base.html' %}
{% block title %}Add Contact — JobTrack{% endblock %}
{% block content %}

<div class="page-header">
    <h1 class="page-title"><span>Add Contact</span></h1>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Company *</label>
            <select name="company_id" required>
                <option value="">— Select Company —</option>
                {% for c in companies %}
                <option value="{{ c.company_id }}">{{ c.company_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Contact Name *</label>
            <input type="text" name="contact_name" required>
        </div>
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone">
        </div>
        <div class="form-group">
            <label>LinkedIn URL</label>
            <input type="text" name="linkedin_url">
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-submit">Save Contact</button>
            <a href="/contacts" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
