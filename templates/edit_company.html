{% extends 'base.html' %}
{% block title %}Edit Company — JobTrack{% endblock %}
{% block content %}

<div class="page-header">
    <h1 class="page-title"><span>Edit Company</span></h1>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Company Name *</label>
            <input type="text" name="company_name" value="{{ company.company_name }}" required>
        </div>
        <div class="form-group">
            <label>Industry</label>
            <input type="text" name="industry" value="{{ company.industry or '' }}">
        </div>
        <div class="form-group">
            <label>Website</label>
            <input type="text" name="website" value="{{ company.website or '' }}">
        </div>
        <div class="form-group">
            <label>City</label>
            <input type="text" name="city" value="{{ company.city or '' }}">
        </div>
        <div class="form-group">
            <label>State</label>
            <input type="text" name="state" value="{{ company.state or '' }}">
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes">{{ company.notes or '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-submit">Update Company</button>
            <a href="/companies" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
