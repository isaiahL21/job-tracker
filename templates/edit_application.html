{% extends 'base.html' %}
{% block title %}Edit Application — JobTrack{% endblock %}
{% block content %}

<div class="page-header">
    <h1 class="page-title"><span>Edit Application</span></h1>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Job *</label>
            <select name="job_id" required>
                {% for j in jobs %}
                <option value="{{ j.job_id }}" {% if j.job_id == application.job_id %}selected{% endif %}>
                    {{ j.company_name }} — {{ j.job_title }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Application Date *</label>
            <input type="date" name="application_date" value="{{ application.application_date }}" required>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                {% for s in ['Applied', 'Screening', 'Interview', 'Offer', 'Rejected', 'Withdrawn'] %}
                <option value="{{ s }}" {% if s == application.status %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Resume Version</label>
            <input type="text" name="resume_version" value="{{ application.resume_version or '' }}">
        </div>
        <div class="checkbox-row">
            <input type="checkbox" name="cover_letter_sent" id="cls" {% if application.cover_letter_sent %}checked{% endif %}>
            <label for="cls">Cover Letter Sent</label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-submit">Update Application</button>
            <a href="/applications" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
