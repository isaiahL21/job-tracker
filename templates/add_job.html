{% extends 'base.html' %}
{% block title %}Add Job — JobTrack{% endblock %}
{% block content %}

<div class="page-header">
    <h1 class="page-title"><span>Add Job</span></h1>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Company *</label>
            <select name="company_id" required>
                <option value="">— Select Company —</option>
                {% for c in companies %}
                <option value="{{ c.company_id }}">{{ c.company_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Job Title *</label>
            <input type="text" name="job_title" required>
        </div>
        <div class="form-group">
            <label>Job Type</label>
            <select name="job_type">
                <option value="">— Select Type —</option>
                <option>Full-time</option>
                <option>Part-time</option>
                <option>Contract</option>
                <option>Internship</option>
            </select>
        </div>
        <div class="form-group">
            <label>Salary Min</label>
            <input type="number" name="salary_min">
        </div>
        <div class="form-group">
            <label>Salary Max</label>
            <input type="number" name="salary_max">
        </div>
        <div class="form-group">
            <label>Job URL</label>
            <input type="text" name="job_url">
        </div>
        <div class="form-group">
            <label>Date Posted</label>
            <input type="date" name="date_posted">
        </div>
        <div class="form-group">
            <label>Requirements (comma separated)</label>
            <input type="text" name="requirements" placeholder="e.g. Python, SQL, Flask">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-submit">Save Job</button>
            <a href="/jobs" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
