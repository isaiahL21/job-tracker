<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Tracker{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-wrapper">
        <nav class="sidebar">
            <div class="sidebar-logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">JobTrack</span>
            </div>
            <ul class="nav-links">
                <li><a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    <span class="nav-icon">◈</span> Dashboard
                </a></li>
                <li><a href="/companies" class="nav-link {% if '/companies' in request.path %}active{% endif %}">
                    <span class="nav-icon">◈</span> Companies
                </a></li>
                <li><a href="/jobs" class="nav-link {% if '/jobs' in request.path %}active{% endif %}">
                    <span class="nav-icon">◈</span> Jobs
                </a></li>
                <li><a href="/applications" class="nav-link {% if '/applications' in request.path %}active{% endif %}">
                    <span class="nav-icon">◈</span> Applications
                </a></li>
                <li><a href="/contacts" class="nav-link {% if '/contacts' in request.path %}active{% endif %}">
                    <span class="nav-icon">◈</span> Contacts
                </a></li>
                <li><a href="/job-match" class="nav-link {% if '/job-match' in request.path %}active{% endif %}">
                    <span class="nav-icon">◈</span> Job Match
                </a></li>
            </ul>
            <div class="sidebar-footer">v1.0</div>
        </nav>

        <main class="main-content">
            <div class="page-inner">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
